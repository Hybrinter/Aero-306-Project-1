label: "case_03_simply_supported"
description: "Four-element simply supported beam under central point load — v_mid = PL^3/48EI"

mesh:
  nodes:
    - id: 1
      x: 0.0
      y: 0.0
    - id: 2
      x: 0.5
      y: 0.0
    - id: 3
      x: 1.0
      y: 0.0
    - id: 4
      x: 1.5
      y: 0.0
    - id: 5
      x: 2.0
      y: 0.0
  elements:
    - id: 1
      node_i: 1
      node_j: 2
      type: beam
      material: unit_beam
    - id: 2
      node_i: 2
      node_j: 3
      type: beam
      material: unit_beam
    - id: 3
      node_i: 3
      node_j: 4
      type: beam
      material: unit_beam
    - id: 4
      node_i: 4
      node_j: 5
      type: beam
      material: unit_beam

materials:
  unit_beam:
    E: 1.0
    A: 1.0
    I: 1.0

boundary_conditions:
  - {node_id: 1, coefficients: [0.0, 1.0, 0.0]}
  - {node_id: 5, coefficients: [0.0, 1.0, 0.0]}

loads:
  nodal:
    - node_id: 3
      type: point_force_y
      magnitude: -1.0
  distributed: []
