label: problem_4
description: >
  Beam with overhangs: free ends at x=0 and x=L, pin supports at x=L/4 and x=3L/4,
  concentrated moment M = 100 in-lb at midspan (x=L/2).
  EI = 1.0E6 lb-in^2, L = 20.03 ft.
  Analytical reactions: R(L/4) = 2M/L (upward), R(3L/4) = -2M/L (downward).
unit_system: empirical
units:
  length: ft
  modulus: psi
  area: in^2
  second_moment: in^4
  moment: in-lb

solutions:
  - label: coarse
    # 4 elements; nodes at 0, L/4, L/2, 3L/4, L
    mesh:
      nodes:
        - {id: 1, x: 0.0}
        - {id: 2, x: 5.0075}        # L/4 = 20.03/4
        - {id: 3, x: 10.015}        # L/2
        - {id: 4, x: 15.0225}       # 3L/4
        - {id: 5, x: 20.03}
      elements:
        - {id: 1, node_i: 1, node_j: 2, type: beam, material: section}
        - {id: 2, node_i: 2, node_j: 3, type: beam, material: section}
        - {id: 3, node_i: 3, node_j: 4, type: beam, material: section}
        - {id: 4, node_i: 4, node_j: 5, type: beam, material: section}
    materials:
      section:
        E: 1000000.0   # psi
        A: 1.0         # in^2
        I: 1.0         # in^4  (EI = 1.0E6 lb-in^2)
    boundary_conditions:
      - {node_id: 1, type: fixed_all}
      - {node_id: 2, type: pin}   # pin support at x=L/4
      - {node_id: 4, type: pin}   # pin support at x=3L/4
      - {node_id: 5, type: fixed_all}
    loads:
      nodal:
        - {node_id: 3, type: point_moment, magnitude: 100.0}   # in-lb, counterclockwise

  - label: fine
    # 8 elements; midpoints inserted between all coarse nodes
    mesh:
      nodes:
        - {id: 1, x: 0.0}
        - {id: 2, x: 2.50375}       # L/8
        - {id: 3, x: 5.0075}        # L/4 -- pin support
        - {id: 4, x: 7.51125}       # 3L/8
        - {id: 5, x: 10.015}        # L/2 -- moment load
        - {id: 6, x: 12.51875}      # 5L/8
        - {id: 7, x: 15.0225}       # 3L/4 -- pin support
        - {id: 8, x: 17.52625}      # 7L/8
        - {id: 9, x: 20.03}         # L
      elements:
        - {id: 1, node_i: 1, node_j: 2, type: beam, material: section}
        - {id: 2, node_i: 2, node_j: 3, type: beam, material: section}
        - {id: 3, node_i: 3, node_j: 4, type: beam, material: section}
        - {id: 4, node_i: 4, node_j: 5, type: beam, material: section}
        - {id: 5, node_i: 5, node_j: 6, type: beam, material: section}
        - {id: 6, node_i: 6, node_j: 7, type: beam, material: section}
        - {id: 7, node_i: 7, node_j: 8, type: beam, material: section}
        - {id: 8, node_i: 8, node_j: 9, type: beam, material: section}
    materials:
      section:
        E: 1000000.0   # psi
        A: 1.0         # in^2
        I: 1.0         # in^4  (EI = 1.0E6 lb-in^2)
    boundary_conditions:
      - { node_id: 1, type: fixed_all }
      - {node_id: 3, type: pin}   # pin support at x=L/4
      - {node_id: 7, type: pin}   # pin support at x=3L/4
      - {node_id: 9, type: fixed_all}
    loads:
      nodal:
        - {node_id: 5, type: point_moment, magnitude: 100.0}   # in-lb, counterclockwise
