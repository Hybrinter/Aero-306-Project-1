label: problem_3_fine
description: >
  Simply-supported flexible beam with elliptic distributed load.
  f(x) = (2W/pi/L) * sqrt(1 - (x/L)^2), L = 20.20 ft, W = 25 lb, EI = 1.0E6 lb-in^2.
  Load discretized into 6 piecewise-linear segments with breakpoints at 0, L/6, L/3, L/2, 2L/3, 5L/6, L.
  Fine mesh: 6 elements.
unit_system: empirical
units:
  length: ft
  modulus: psi
  area: in^2
  second_moment: in^4
  force: lb
  distributed: lb/ft

mesh:
  nodes:
    - {id: 1, x: 0.0}
    - {id: 2, x: 3.3667}       # L/6 = 20.20/6
    - {id: 3, x: 6.7333}       # L/3
    - {id: 4, x: 10.10}        # L/2
    - {id: 5, x: 13.4667}      # 2L/3
    - {id: 6, x: 16.8333}      # 5L/6
    - {id: 7, x: 20.20}        # L
  elements:
    - {id: 1, node_i: 1, node_j: 2, type: beam, material: section}
    - {id: 2, node_i: 2, node_j: 3, type: beam, material: section}
    - {id: 3, node_i: 3, node_j: 4, type: beam, material: section}
    - {id: 4, node_i: 4, node_j: 5, type: beam, material: section}
    - {id: 5, node_i: 5, node_j: 6, type: beam, material: section}
    - {id: 6, node_i: 6, node_j: 7, type: beam, material: section}

materials:
  section:
    E: 1000000.0   # psi
    A: 1.0         # in^2
    I: 1.0         # in^4  (EI = 1.0E6 lb-in^2)

boundary_conditions:
  - {node_id: 1, type: pin}     # left support
  - {node_id: 7, type: roller}  # right support

loads:
  distributed:
    # f(x) = (2W/pi/L) * sqrt(1-(x/L)^2), peak f(0) = 0.7878 lb/ft
    # f(L/6)  = 0.7878 * sqrt(35/36) = 0.7768 lb/ft
    # f(L/3)  = 0.7878 * sqrt(8/9)   = 0.7427 lb/ft
    # f(L/2)  = 0.7878 * sqrt(3/4)   = 0.6822 lb/ft
    # f(2L/3) = 0.7878 * sqrt(5/9)   = 0.5872 lb/ft
    # f(5L/6) = 0.7878 * sqrt(11/36) = 0.4356 lb/ft
    # f(L)    = 0
    - {element_id: 1, type: distributed_linear, w_i: 0.7878, w_j: 0.7768}
    - {element_id: 2, type: distributed_linear, w_i: 0.7768, w_j: 0.7427}
    - {element_id: 3, type: distributed_linear, w_i: 0.7427, w_j: 0.6822}
    - {element_id: 4, type: distributed_linear, w_i: 0.6822, w_j: 0.5872}
    - {element_id: 5, type: distributed_linear, w_i: 0.5872, w_j: 0.4356}
    - {element_id: 6, type: distributed_linear, w_i: 0.4356, w_j: 0.0}
