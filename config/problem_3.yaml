label: problem_3
description: >
  Simply-supported flexible beam with elliptic distributed load.
  f(x) = (2W/pi/L) * sqrt(1 - (x/L)^2), L = 20.20 ft, W = 25 lb, EI = 1.0E6 lb-in^2.
  Load discretized into piecewise-linear segments matching element boundaries.
unit_system: empirical
units:
  length: ft
  modulus: psi
  area: in^2
  second_moment: in^4
  force: lb
  distributed: lb/ft

solutions:
  - label: coarse
    # 3 elements; load breakpoints at 0, L/3, 2L/3, L
    # f(L/3) = 0.7878*sqrt(8/9) = 0.7427 lb/ft
    # f(2L/3) = 0.7878*sqrt(5/9) = 0.5872 lb/ft
    mesh:
      nodes:
        - {id: 1, x: 0.0, y: 0.0}
        - {id: 2, x: 6.7333, y: 0.0}       # L/3 = 20.20/3
        - {id: 3, x: 13.4667, y: 0.0}      # 2L/3
        - {id: 4, x: 20.20, y: 0.0}
      elements:
        - {id: 1, node_i: 1, node_j: 2, type: beam, material: section}
        - {id: 2, node_i: 2, node_j: 3, type: beam, material: section}
        - {id: 3, node_i: 3, node_j: 4, type: beam, material: section}
    materials:
      section:
        E: 1000000.0   # psi
        A: 1.0         # in^2
        I: 1.0         # in^4  (EI = 1.0E6 lb-in^2)
    boundary_conditions:
      - {node_id: 1, coefficients: [0.0, 1.0, 0.0]}
      - {node_id: 1, coefficients: [0.0, 0.0, 1.0]}
      - {node_id: 2, coefficients: [0.0, 1.0, 0.0]}
    loads:
      distributed:
        - element_ids: all
          expression: "2*W / (pi * L) * sqrt(1 - (x / L)**2)"
          parameters:
            W: 25.0
            L: 20.20

  - label: fine
    # 6 elements; load breakpoints at 0, L/6, L/3, L/2, 2L/3, 5L/6, L
    # f(L/6)  = 0.7878*sqrt(35/36) = 0.7768 lb/ft
    # f(L/3)  = 0.7878*sqrt(8/9)   = 0.7427 lb/ft
    # f(L/2)  = 0.7878*sqrt(3/4)   = 0.6822 lb/ft
    # f(2L/3) = 0.7878*sqrt(5/9)   = 0.5872 lb/ft
    # f(5L/6) = 0.7878*sqrt(11/36) = 0.4356 lb/ft
    mesh:
      nodes:
        - {id: 1, x: 0.0, y: 0.0}
        - {id: 2, x: 3.3667, y: 0.0}       # L/6 = 20.20/6
        - {id: 3, x: 6.7333, y: 0.0}       # L/3
        - {id: 4, x: 10.10, y: 0.0}        # L/2
        - {id: 5, x: 13.4667, y: 0.0}      # 2L/3
        - {id: 6, x: 16.8333, y: 0.0}      # 5L/6
        - {id: 7, x: 20.20, y: 0.0}        # L
      elements:
        - {id: 1, node_i: 1, node_j: 2, type: beam, material: section}
        - {id: 2, node_i: 2, node_j: 3, type: beam, material: section}
        - {id: 3, node_i: 3, node_j: 4, type: beam, material: section}
        - {id: 4, node_i: 4, node_j: 5, type: beam, material: section}
        - {id: 5, node_i: 5, node_j: 6, type: beam, material: section}
        - {id: 6, node_i: 6, node_j: 7, type: beam, material: section}
    materials:
      section:
        E: 1000000.0   # psi
        A: 1.0         # in^2
        I: 1.0         # in^4  (EI = 1.0E6 lb-in^2)
    boundary_conditions:
      - {node_id: 1, coefficients: [0.0, 1.0, 0.0]}
      - {node_id: 1, coefficients: [0.0, 0.0, 1.0]}
      - {node_id: 3, coefficients: [0.0, 1.0, 0.0]}
    loads:
      distributed:
        - element_ids: all
          expression: "2*W / (pi * L) * sqrt(1 - (x / L)**2)"
          parameters:
            W: 25.0
            L: 20.20
