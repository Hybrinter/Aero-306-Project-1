label: problem_4_coarse
description: >
  Beam with overhangs: free ends at x=0 and x=L, pin supports at x=L/4 and x=3L/4,
  concentrated moment M = 100 in-lb at midspan (x=L/2).
  EI = 1.0E6 lb-in^2, L = 20.03 ft.
  Analytical reactions: R(L/4) = 2M/L (upward), R(3L/4) = -2M/L (downward).
  Coarse mesh: 4 elements.
unit_system: empirical
units:
  length: ft
  modulus: psi
  area: in^2
  second_moment: in^4
  moment: in-lb

mesh:
  nodes:
    - {id: 1, x: 0.0}
    - {id: 2, x: 5.0075}        # L/4 = 20.03/4
    - {id: 3, x: 10.015}        # L/2 = 20.03/2
    - {id: 4, x: 15.0225}       # 3L/4
    - {id: 5, x: 20.03}
  elements:
    - {id: 1, node_i: 1, node_j: 2, type: beam, material: section}
    - {id: 2, node_i: 2, node_j: 3, type: beam, material: section}
    - {id: 3, node_i: 3, node_j: 4, type: beam, material: section}
    - {id: 4, node_i: 4, node_j: 5, type: beam, material: section}

materials:
  section:
    E: 1000000.0   # psi
    A: 1.0         # in^2
    I: 1.0         # in^4  (EI = 1.0E6 lb-in^2)

boundary_conditions:
  - {node_id: 2, type: pin}   # pin support at x=L/4
  - {node_id: 4, type: pin}   # pin support at x=3L/4

loads:
  nodal:
    - {node_id: 3, type: point_moment, magnitude: 100.0}   # in-lb, counterclockwise
