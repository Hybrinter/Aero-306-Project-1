label: problem_3_coarse
description: >
  Simply-supported flexible beam with elliptic distributed load.
  f(x) = (2W/pi/L) * sqrt(1 - (x/L)^2), L = 20.20 ft, W = 25 lb, EI = 1.0E6 lb-in^2.
  Load discretized into 3 piecewise-linear segments with breakpoints at 0, L/3, 2L/3, L.
  Peak intensity f(0) = 2W/(pi*L) = 0.7878 lb/ft; f(L) = 0.
  Coarse mesh: 3 elements.
unit_system: empirical
units:
  length: ft
  modulus: psi
  area: in^2
  second_moment: in^4
  force: lb
  distributed: lb/ft

mesh:
  nodes:
    - {id: 1, x: 0.0}
    - {id: 2, x: 6.7333}       # L/3 = 20.20/3
    - {id: 3, x: 13.4667}      # 2L/3
    - {id: 4, x: 20.20}
  elements:
    - {id: 1, node_i: 1, node_j: 2, type: beam, material: section}
    - {id: 2, node_i: 2, node_j: 3, type: beam, material: section}
    - {id: 3, node_i: 3, node_j: 4, type: beam, material: section}

materials:
  section:
    E: 1000000.0   # psi
    A: 1.0         # in^2
    I: 1.0         # in^4  (EI = 1.0E6 lb-in^2)

boundary_conditions:
  - {node_id: 1, type: pin}     # left support
  - {node_id: 4, type: roller}  # right support

loads:
  distributed:
    # f(x) = (2W/pi/L) * sqrt(1-(x/L)^2), peak = 0.7878 lb/ft
    # f(L/3) = 0.7878 * sqrt(8/9)  = 0.7427 lb/ft
    # f(2L/3) = 0.7878 * sqrt(5/9) = 0.5872 lb/ft
    # f(L)    = 0
    - {element_id: 1, type: distributed_linear, w_i: 0.7878, w_j: 0.7427}
    - {element_id: 2, type: distributed_linear, w_i: 0.7427, w_j: 0.5872}
    - {element_id: 3, type: distributed_linear, w_i: 0.5872, w_j: 0.0}
