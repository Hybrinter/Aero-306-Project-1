label: "case_02_cantilever_beam"
description: "Two-element cantilever beam under tip point load — validates v_tip = PL^3/3EI"

mesh:
  nodes:
    - id: 1
      x: 0.0
      y: 0.0
    - id: 2
      x: 0.5
      y: 0.0
    - id: 3
      x: 1.0
      y: 0.0
  elements:
    - id: 1
      node_i: 1
      node_j: 2
      type: beam
      material: unit_beam
    - id: 2
      node_i: 2
      node_j: 3
      type: beam
      material: unit_beam

materials:
  unit_beam:
    E: 1.0
    A: 1.0
    I: 1.0

boundary_conditions:
  - {node_id: 1, coefficients: [0.0, 1.0, 0.0]}
  - {node_id: 1, coefficients: [0.0, 0.0, 1.0]}

loads:
  nodal:
    - node_id: 3
      type: point_force_y
      magnitude: -1.0
  distributed: []
